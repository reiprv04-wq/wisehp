<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WISE Journal</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@300;400;700;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --navy:    #0F172A;
      --navy2:   #1E293B;
      --blue:    #1E40AF;
      --accent:  #3B82F6;
      --white:   #FFFFFF;
      --bg:      #F8FAFC;
      --text:    #0F172A;
      --text2:   #475569;
      --line:    #E2E8F0;
      --font-en: 'Times New Roman', Georgia, serif;
      --font-jp: 'Noto Serif JP', serif;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }

    body {
      font-family: var(--font-jp);
      background: var(--white);
      color: var(--text);
      -webkit-font-smoothing: antialiased;
      line-height: 1.9;
      overflow-x: hidden;
    }

    /* ════════════════════════════════════════
       HEADER
    ════════════════════════════════════════ */
    #header {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      height: 90px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 60px;
      z-index: 1000;
      transition: background 0.4s, backdrop-filter 0.4s, box-shadow 0.4s;
    }

    #header.top-transparent {
      background: transparent;
    }

    #header.scrolled {
      background: rgba(255,255,255,0.95);
      backdrop-filter: blur(12px);
      box-shadow: 0 1px 0 rgba(0,0,0,0.06);
    }

    .logo img {
      height: 36px;
      display: block;
    }

    nav {
      display: flex;
      align-items: center;
      gap: 36px;
    }

    #header.top-transparent nav a {
      font-family: var(--font-en);
      font-size: 0.62rem;
      font-weight: 700;
      letter-spacing: 0.22em;
      color: rgba(255,255,255,0.85);
      text-decoration: none;
      transition: color 0.2s;
    }

    #header.top-transparent nav a:hover {
      color: var(--white);
    }

    #header.scrolled nav a {
      font-family: var(--font-en);
      font-size: 0.62rem;
      font-weight: 700;
      letter-spacing: 0.22em;
      color: var(--navy);
      text-decoration: none;
      transition: color 0.2s;
    }

    #header.scrolled nav a:hover {
      color: var(--accent);
    }

    #header .nav-entry {
      border: 1px solid currentColor;
      padding: 6px 16px;
      border-radius: 2px;
    }

    /* ════════════════════════════════════════
       BREADCRUMB
    ════════════════════════════════════════ */
    .breadcrumb {
      margin-top: 90px;
      padding: 14px 80px;
      font-family: var(--font-en);
      font-size: 0.62rem;
      letter-spacing: 0.25em;
      color: #94A3B8;
      border-bottom: 1px solid var(--line);
    }
    .breadcrumb a {
      color: #94A3B8;
      text-decoration: none;
      transition: color 0.2s;
    }
    .breadcrumb a:hover { color: var(--accent); }
    .breadcrumb span { margin: 0 8px; }

    /* ════════════════════════════════════════
       SHIMMER
    ════════════════════════════════════════ */
    @keyframes shimmer {
      0%   { background-position: -800px 0; }
      100% { background-position:  800px 0; }
    }

    .skel {
      display: block;
      border-radius: 2px;
      background: linear-gradient(90deg, #e2e8f0 25%, #f1f5f9 50%, #e2e8f0 75%);
      background-size: 1600px 100%;
      animation: shimmer 1.8s infinite linear;
    }

    .skel-dark {
      display: block;
      border-radius: 2px;
      background: linear-gradient(90deg, rgba(255,255,255,0.09) 25%, rgba(255,255,255,0.16) 50%, rgba(255,255,255,0.09) 75%);
      background-size: 1600px 100%;
      animation: shimmer 1.8s infinite linear;
    }

    .tl { height: 11px; margin-bottom: 8px; display: block; }
    .tl.f { width: 100%; }
    .tl.m { width: 80%; }
    .tl.s { width: 60%; }
    .para { margin-bottom: 24px; }

    /* ════════════════════════════════════════
       BODY TEXT — shared
    ════════════════════════════════════════ */
    .body-p, .qa-p {
      font-size: 0.92rem;
      line-height: 1.95;
      color: var(--text);
      margin-bottom: 16px;
    }

    .dark-text {
      font-size: 0.92rem;
      line-height: 2.0;
      color: rgba(255,255,255,0.72);
      margin-bottom: 14px;
    }

    /* ════════════════════════════════════════
       HERO — intern / alumni (left-aligned)
    ════════════════════════════════════════ */
    .art-hero {
      position: relative;
      width: 100%;
      height: 580px;
      overflow: hidden;
      background: var(--navy);
    }

    .art-hero::before {
      content: '';
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(rgba(255,255,255,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.04) 1px, transparent 1px);
      background-size: 60px 60px;
      z-index: 0;
    }

    .h-bg {
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, #1e293b 0%, #0f172a 60%);
      z-index: 0;
    }

    .h-grad {
      position: absolute;
      inset: 0;
      background: linear-gradient(
        to right,
        rgba(15,23,42,0.92) 0%,
        rgba(15,23,42,0.60) 50%,
        rgba(15,23,42,0.0)  100%
      );
      z-index: 1;
    }

    .h-bg-img {
      position: absolute;
      inset: 0;
      object-fit: cover;
      width: 100%;
      height: 100%;
      z-index: 0;
    }

    .h-body {
      position: absolute;
      bottom: 0;
      left: 0;
      padding: 64px 80px;
      max-width: 640px;
      z-index: 2;
    }

    .hero-badge {
      font-family: var(--font-en);
      font-weight: 900;
      font-size: 0.72rem;
      letter-spacing: 0.65em;
      color: rgba(255,255,255,0.65);
      display: inline-block;
      padding-bottom: 5px;
      border-bottom: 2px solid var(--accent);
      margin-bottom: 32px;
    }

    .hero-headline-text {
      font-size: 3rem;
      font-weight: 900;
      color: var(--white);
      line-height: 1.55;
      letter-spacing: 0.08em;
      margin-bottom: 36px;
    }

    .hero-dept-badge, .hero-company-badge {
      display: inline-block;
      font-family: var(--font-en);
      font-size: 0.58rem;
      font-weight: 700;
      letter-spacing: 0.45em;
      color: var(--accent);
      border: 1px solid var(--accent);
      padding: 4px 14px;
      margin-bottom: 16px;
    }

    .hero-name-en-text {
      font-family: var(--font-en);
      font-size: 0.65rem;
      letter-spacing: 0.5em;
      color: rgba(255,255,255,0.35);
      display: block;
      margin-bottom: 8px;
    }

    .hero-name-ja-text {
      font-size: 2.2rem;
      font-weight: 900;
      color: var(--white);
      letter-spacing: 0.1em;
      display: block;
      margin-bottom: 10px;
    }

    .hero-univ-text, .hero-meta-text {
      font-family: var(--font-en);
      font-size: 0.62rem;
      letter-spacing: 0.3em;
      color: rgba(255,255,255,0.38);
    }

    /* scroll line */
    .scroll-line {
      position: absolute;
      bottom: 0;
      left: 50%;
      width: 1px;
      height: 100px;
      background: rgba(255,255,255,0.08);
      overflow: hidden;
      z-index: 3;
    }

    .scroll-line-fill {
      width: 100%;
      height: 100%;
      background: var(--accent);
      transform: translateY(-100%);
      animation: scrollLine 3s infinite;
    }

    @keyframes scrollLine {
      0%   { transform: translateY(-100%); }
      50%  { transform: translateY(0); }
      100% { transform: translateY(100%); }
    }

    /* ════════════════════════════════════════
       HERO — event (centered)
    ════════════════════════════════════════ */
    .art-hero.event-hero {
      height: 480px;
    }

    .art-hero.event-hero .h-body {
      position: absolute;
      inset: 0;
      bottom: unset;
      left: unset;
      padding: 0 80px;
      max-width: none;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
    }

    .hero-title-event {
      font-size: 3.2rem;
      font-weight: 900;
      color: var(--white);
      line-height: 1.45;
      letter-spacing: 0.08em;
      margin-bottom: 32px;
    }

    .hero-meta-row {
      display: flex;
      align-items: center;
      gap: 24px;
    }

    .hero-date-text {
      font-family: var(--font-en);
      font-size: 0.68rem;
      letter-spacing: 0.35em;
      color: rgba(255,255,255,0.45);
    }

    .hero-dot {
      width: 3px;
      height: 3px;
      border-radius: 50%;
      background: var(--accent);
    }

    .hero-location-text {
      font-family: var(--font-en);
      font-size: 0.68rem;
      letter-spacing: 0.3em;
      color: rgba(255,255,255,0.45);
    }

    /* ════════════════════════════════════════
       HERO — press (2-col grid)
    ════════════════════════════════════════ */
    .art-hero.press-hero {
      height: auto;
      min-height: 480px;
      display: grid;
      grid-template-columns: 1fr 1fr;
    }

    .art-hero.press-hero .h-body {
      position: relative;
      bottom: unset;
      left: unset;
      padding: 80px;
      max-width: none;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      z-index: 1;
    }

    .press-hero-right {
      position: relative;
      z-index: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      border-left: 1px solid rgba(255,255,255,0.07);
    }

    .hero-logo-box {
      width: 260px;
      height: 120px;
      border: 1px solid rgba(255,255,255,0.12);
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }

    .hero-logo-box::before,
    .hero-logo-box::after {
      content: '';
      position: absolute;
      width: 12px;
      height: 12px;
      border-color: var(--accent);
      border-style: solid;
    }
    .hero-logo-box::before {
      top: -1px; left: -1px;
      border-width: 2px 0 0 2px;
    }
    .hero-logo-box::after {
      bottom: -1px; right: -1px;
      border-width: 0 2px 2px 0;
    }

    .hero-logo-label {
      font-family: var(--font-en);
      font-size: 0.58rem;
      letter-spacing: 0.45em;
      color: rgba(255,255,255,0.2);
    }

    .hero-tag {
      font-family: var(--font-en);
      font-size: 0.54rem;
      letter-spacing: 0.35em;
      color: var(--accent);
      border: 1px solid rgba(59,130,246,0.5);
      padding: 4px 12px;
      margin-right: 8px;
      margin-bottom: 10px;
      display: inline-block;
    }

    .hero-meta-row-press {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-bottom: 16px;
    }

    .press-hero-title {
      font-size: 2.8rem;
      font-weight: 900;
      color: var(--white);
      line-height: 1.5;
      letter-spacing: 0.06em;
      margin-bottom: 28px;
    }

    .hero-badge-press {
      font-family: var(--font-en);
      font-weight: 900;
      font-size: 0.68rem;
      letter-spacing: 0.65em;
      color: rgba(255,255,255,0.55);
      display: inline-block;
      padding-bottom: 5px;
      border-bottom: 2px solid var(--accent);
      margin-bottom: 28px;
      align-self: flex-start;
    }

    .hero-date-press {
      font-family: var(--font-en);
      font-size: 0.62rem;
      letter-spacing: 0.3em;
      color: rgba(255,255,255,0.35);
      margin-top: 8px;
      display: block;
    }

    /* ════════════════════════════════════════
       MAIN BOX (navy dark 2-col)
    ════════════════════════════════════════ */
    .main-box {
      background: var(--navy);
      max-width: 1160px;
      margin: 80px auto;
      display: grid;
      grid-template-columns: 1fr 1fr;
      border: 1px solid rgba(255,255,255,0.06);
      position: relative;
      overflow: hidden;
    }

    .main-box::after {
      content: '';
      position: absolute;
      top: -120px;
      right: -120px;
      width: 320px;
      height: 320px;
      border-radius: 50%;
      background: rgba(30,64,175,0.10);
      pointer-events: none;
    }

    .main-box-col {
      padding: 64px 56px;
      position: relative;
      z-index: 1;
    }

    .main-box-col:first-child {
      border-right: 1px solid rgba(255,255,255,0.07);
    }

    .col-eyebrow {
      font-family: var(--font-en);
      font-size: 0.58rem;
      letter-spacing: 0.6em;
      color: var(--accent);
      display: block;
      margin-bottom: 14px;
    }

    .col-title-label {
      font-size: 1.4rem;
      font-weight: 900;
      color: var(--white);
      letter-spacing: 0.05em;
      margin-bottom: 36px;
      padding-bottom: 24px;
      border-bottom: 1px solid rgba(255,255,255,0.08);
    }

    /* ════════════════════════════════════════
       BANNER STRIP
    ════════════════════════════════════════ */
    .banner {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 36px;
      padding: 0 0 80px;
    }

    .banner-line {
      flex: 0 0 80px;
      height: 1px;
      background: linear-gradient(to right, transparent, #CBD5E1);
    }
    .banner-line:last-child {
      background: linear-gradient(to left, transparent, #CBD5E1);
    }

    .banner-label {
      font-family: var(--font-en);
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 0.22em;
      color: var(--text2);
      white-space: nowrap;
    }

    /* ════════════════════════════════════════
       Q&A SECTION
    ════════════════════════════════════════ */
    .qa-wrap {
      max-width: 1160px;
      margin: 0 auto;
      padding: 0 80px;
    }

    .qa-block {
      margin-bottom: 96px;
      position: relative;
    }

    .qa-head {
      display: flex;
      align-items: center;
      gap: 20px;
      margin-bottom: 48px;
      padding-bottom: 20px;
      border-bottom: 1px solid var(--line);
    }

    .qa-num {
      font-family: var(--font-en);
      font-size: 0.6rem;
      font-weight: 700;
      letter-spacing: 0.5em;
      color: var(--accent);
      flex-shrink: 0;
      white-space: nowrap;
    }

    .qa-head-divider {
      width: 1px;
      height: 18px;
      background: var(--line);
      flex-shrink: 0;
    }

    .qa-question-text {
      font-size: 1.1rem;
      font-weight: 700;
      color: var(--text);
      letter-spacing: 0.03em;
      line-height: 1.55;
    }

    /* Q&A layouts */
    .layout-img-left {
      display: grid;
      grid-template-columns: 5fr 7fr;
      gap: 72px;
      align-items: start;
    }

    .layout-img-right {
      display: grid;
      grid-template-columns: 7fr 5fr;
      gap: 72px;
      align-items: start;
    }

    .layout-full {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 72px;
    }

    .layout-single {
      max-width: 780px;
    }

    .layout-two-col {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 72px;
    }

    .layout-asymmetric {
      display: grid;
      grid-template-columns: 3fr 2fr;
      gap: 72px;
    }

    /* img-box */
    .img-box {
      width: 100%;
      aspect-ratio: 3 / 4;
      background: linear-gradient(145deg, #CBD5E1 0%, #94A3B8 100%);
      position: relative;
      overflow: hidden;
    }

    .img-box::after {
      content: "PHOTO";
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: var(--font-en);
      font-size: 0.62rem;
      font-weight: 700;
      letter-spacing: 0.4em;
      color: rgba(255,255,255,0.45);
    }

    .img-box.has-img::after { display: none; }

    .img-box img {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      z-index: 1;
    }

    /* WISE watermark */
    .watermark-wrap { position: relative; }

    .watermark {
      position: absolute;
      right: -10px;
      top: -10px;
      font-family: var(--font-en);
      font-size: 200px;
      font-weight: 900;
      color: rgba(15,23,42,0.03);
      line-height: 1;
      letter-spacing: -0.04em;
      user-select: none;
      pointer-events: none;
      z-index: 0;
    }

    .watermark-wrap > *:not(.watermark) { position: relative; z-index: 1; }

    /* ════════════════════════════════════════
       SCHEDULE
    ════════════════════════════════════════ */
    .schedule-wrap {
      max-width: 1160px;
      margin: 0 auto 100px;
      padding: 0 80px;
    }

    .schedule-head {
      display: flex;
      align-items: center;
      gap: 20px;
      margin-bottom: 32px;
    }

    .schedule-eyebrow {
      font-family: var(--font-en);
      font-size: 0.6rem;
      letter-spacing: 0.55em;
      color: var(--accent);
      white-space: nowrap;
    }

    .schedule-title-text {
      font-size: 1.15rem;
      font-weight: 900;
      color: var(--navy);
      letter-spacing: 0.05em;
      white-space: nowrap;
    }

    .schedule-head-line {
      flex: 1;
      height: 1px;
      background: var(--line);
    }

    .schedule-table {
      border: 1px solid var(--line);
      border-radius: 4px;
      overflow: hidden;
    }

    .schedule-row {
      display: grid;
      grid-template-columns: 88px 1fr;
      border-bottom: 1px solid var(--line);
    }
    .schedule-row:last-child { border-bottom: none; }

    .schedule-time-cell {
      background: var(--bg);
      padding: 22px 28px;
      border-right: 1px solid var(--line);
      display: flex;
      align-items: center;
    }

    .s-time-text {
      font-family: var(--font-en);
      font-size: 0.8rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      color: var(--text2);
    }

    .schedule-item-cell {
      padding: 22px 36px;
      display: flex;
      align-items: center;
    }

    .s-item-text {
      font-size: 0.9rem;
      color: var(--text);
      letter-spacing: 0.02em;
    }

    /* ════════════════════════════════════════
       EVENT SECTIONS
    ════════════════════════════════════════ */
    .intro-wrap-event {
      max-width: 720px;
      margin: 80px auto 72px;
      padding: 0 40px;
      text-align: center;
    }

    .intro-eyebrow {
      font-family: var(--font-en);
      font-size: 0.58rem;
      letter-spacing: 0.6em;
      color: var(--accent);
      display: block;
      margin-bottom: 20px;
    }

    .intro-title {
      font-size: 1.8rem;
      font-weight: 900;
      color: var(--navy);
      letter-spacing: 0.06em;
      line-height: 1.6;
      margin-bottom: 32px;
    }

    .intro-divider {
      width: 40px;
      height: 2px;
      background: var(--accent);
      margin: 0 auto 32px;
    }

    .photo-wrap {
      max-width: 1160px;
      margin: 0 auto 80px;
      padding: 0 80px;
    }

    .photo-grid {
      display: grid;
      grid-template-columns: 2fr 1fr;
      grid-template-rows: 1fr 1fr;
      gap: 12px;
      height: 520px;
    }

    .photo-box {
      background: linear-gradient(145deg, #CBD5E1 0%, #94A3B8 100%);
      overflow: hidden;
      position: relative;
    }

    .photo-box.large {
      grid-row: 1 / 3;
    }

    .photo-box::after {
      content: "PHOTO";
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: var(--font-en);
      font-size: 0.62rem;
      font-weight: 700;
      letter-spacing: 0.4em;
      color: rgba(255,255,255,0.45);
    }

    .photo-box.has-img::after { display: none; }

    .photo-box img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .photo-count {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-top: 16px;
    }

    .photo-count-label {
      font-family: var(--font-en);
      font-size: 0.58rem;
      letter-spacing: 0.4em;
      color: var(--text2);
    }

    .photo-count-line {
      flex: 1;
      height: 1px;
      background: var(--line);
    }

    .photo-count-num {
      font-family: var(--font-en);
      font-size: 0.58rem;
      letter-spacing: 0.2em;
      color: #94A3B8;
    }

    .body-wrap-event {
      max-width: 1160px;
      margin: 0 auto 80px;
      padding: 0 80px;
    }

    .body-head {
      display: flex;
      align-items: center;
      gap: 20px;
      margin-bottom: 48px;
      padding-bottom: 20px;
      border-bottom: 1px solid var(--line);
    }

    .body-eyebrow {
      font-family: var(--font-en);
      font-size: 0.6rem;
      letter-spacing: 0.55em;

  <script>
    // ══════════════════════════════════════════

    const { createClient } = supabase;
    const db = createClient(

      'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtjeGJuYWFjY2p3cWpra3ZocnZtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgwMDAyMTQsImV4cCI6MjA5MzU3NjIxNH0.3mmxurljtN4cqrs7q1SF6mxFgbNmJMaeq8IYroJcaNM'

    // ══════════════════════════════════════════
    // Header scroll behavior
    // ══════════════════════════════════════════
    const hdr = document.getElementById('header');
    window.addEventListener('scroll', () => {
      if (window.scrollY > 20) {

      } else {
        hdr.classList.remove('scrolled');

      }

    // ══════════════════════════════════════════
    // Helpers
    // ══════════════════════════════════════════
    function esc(str) {
      if (!str) return '';
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    function textToParas(text, cls) {
      if (!text) return '';
      return text.split(/\n+/)
        .filter(l => l.trim())
        .map(l => `<p class="${cls}">${esc(l)}</p>`)
        .join('');
    }

    function imgBox(src) {
      if (src) {
        return `<div class="img-box has-img"><img src="${esc(src)}" alt=""></div>`;
      }
      return `<div class="img-box"></div>`;
    }

    function photoBox(src, large) {
      const cls = 'photo-box' + (large ? ' large' : '') + (src ? ' has-img' : '');
      if (src) {
        return `<div class="${cls}"><img src="${esc(src)}" alt=""></div>`;
      }
      return `<div class="${cls}"></div>`;
    }

    function renderSchedule(schedule) {
      if (!schedule || schedule.length === 0) return '';
      const rows = schedule.map(s =>
        `<div class="schedule-row">
          <div class="schedule-time-cell"><span class="s-time-text">${esc(s.time)}</span></div>
          <div class="schedule-item-cell"><span class="s-item-text">${esc(s.content)}</span></div>
        </div>`
      ).join('');
      return `
        <div class="schedule-wrap">
          <div class="schedule-head">
            <span class="schedule-eyebrow">DAILY SCHEDULE</span>
            <span class="schedule-title-text">ある1日のスケジュール</span>
            <div class="schedule-head-line"></div>
          </div>
          <div class="schedule-table">${rows}</div>
        </div>`;
    }

    let _allArticles = [];

    function renderRelated(currentId) {
      const others = _allArticles.filter(a => String(a.id) !== String(currentId)).slice(0, 3);
      if (others.length === 0) return '';

      const cards = others.map(a => {
        const imgHtml = a.img
          ? `<img src="${esc(a.img)}" alt="">`
          : '';
        return `<a href="article.html?id=${a.id}" class="rel-card">
          <div class="rel-card-img">${imgHtml}</div>
          <div class="rel-card-body">
            <div class="rel-card-meta">
              <span class="rel-card-date">${esc(a.date)}</span>
              <span class="rel-card-tag">${esc(a.tag)}</span>
            </div>
            <div class="rel-card-title">${esc(a.title || a.catchcopy || a.eventTitle || a.pressTitle || '記事')}</div>
            <div class="rel-card-excerpt">${esc((a.excerpt || '').slice(0, 60))}</div>
            <div class="rel-card-arrow">READ MORE →</div>
          </div>
        </a>`;
      }).join('');

      return `
        <div class="related-wrap">
          <div class="related-head">
            <span class="related-eyebrow">RELATED ARTICLES</span>
            <span class="related-title-text">関連記事</span>
            <div class="related-head-line"></div>
          </div>
          <div class="related-grid">${cards}</div>
        </div>`;
    }

    // Split paragraphs for 2-col QA
    function splitParas(text) {
      if (!text) return ['', ''];
      const paras = text.split(/\n+/).filter(l => l.trim());
      if (paras.length < 2) return [text, ''];
      const mid = Math.ceil(paras.length / 2);
      return [paras.slice(0, mid).join('\n'), paras.slice(mid).join('\n')];
    }

    // ══════════════════════════════════════════
    // Render: intern
    // ══════════════════════════════════════════
    function renderIntern(a) {
      const heroPhotoSrc = a.heroPhoto || '';
      const q = (a.qa || []);
      const qGet = (i) => q[i] || {};

      // Q1: img-left
      const q1 = qGet(0);
      const q2 = qGet(1);
      const q3 = qGet(2);
      const q4 = qGet(3);
      const q5 = qGet(4);

      const [q2a, q2b] = splitParas(q2.answer || '');
      const [q3a, q3b] = splitParas(q3.answer || '');

      return `
        <section class="art-hero">
          <div class="h-bg"></div>

            ${textToParas(a.reason || '', 'dark-text')}
          </div>
          <div class="main-box-col">
            <span class="col-eyebrow">RESPONSIBILITIES &amp; REWARDS</span>
            <div class="col-title-label">具体的な業務とやりがい</div>
            ${textToParas(a.work || '', 'dark-text')}
          </div>
        </div>

        <div class="banner">
          <div class="banner-line"></div>
          <span class="banner-label">${esc(a.bannerLabel || 'Internship for Self-Driving Experience')}</span>
          <div class="banner-line"></div>
        </div>

        <div class="qa-wrap">

          <!-- Q1: img-left -->
          <div class="qa-block">
            <div class="qa-head">
              <span class="qa-num">Q — 01</span>
              <div class="qa-head-divider"></div>
              <span class="qa-question-text">${esc(q1.question || '')}</span>
            </div>
            <div class="layout-img-left">
              ${imgBox(a.q1Photo || q1.photo || '')}
              <div class="qa-text-col">${textToParas(q1.answer || '', 'qa-p')}</div>
            </div>
          </div>

          <!-- Q2: 2-col + watermark -->
          <div class="qa-block watermark-wrap">
            <div class="watermark">WISE</div>
            <div class="qa-head">
              <span class="qa-num">Q — 02</span>
              <div class="qa-head-divider"></div>
              <span class="qa-question-text">${esc(q2.question || '')}</span>
            </div>
            <div class="layout-full">
              <div class="qa-text-col">${textToParas(q2a, 'qa-p')}</div>
              <div class="qa-text-col">${textToParas(q2b || q2.answer || '', 'qa-p')}</div>
            </div>
          </div>

          <!-- Q3: 2-col -->
          <div class="qa-block">
            <div class="qa-head">
              <span class="qa-num">Q — 03</span>
              <div class="qa-head-divider"></div>
              <span class="qa-question-text">${esc(q3.question || '')}</span>
            </div>
            <div class="layout-full">
              <div class="qa-text-col">${textToParas(q3a, 'qa-p')}</div>
              <div class="qa-text-col">${textToParas(q3b || q3.answer || '', 'qa-p')}</div>

              <div class="qa-head-divider"></div>

            </div>

        ${renderSchedule(a.schedule)}

      `;

    function renderAlumni(a) {
      const heroPhotoSrc = a.heroPhoto || '';
      const q = (a.qa || []);
      const qGet = (i) => q[i] || {};
      const q1 = qGet(0);
      const q2 = qGet(1);
      const q3 = qGet(2);
      const q4 = qGet(3);
      const q5 = qGet(4);

      const [q2a, q2b] = splitParas(q2.answer || '');
      const [q3a, q3b] = splitParas(q3.answer || '');
      const [q4a, q4b] = splitParas(q4.answer || '');

      return `
        <section class="art-hero">
          <div class="h-bg"></div>
          ${heroPhotoSrc ? `<img class="h-bg-img" src="${esc(heroPhotoSrc)}" alt="">` : ''}
          <div class="h-grad"></div>
          <div class="h-body">
            <span class="hero-badge">ALUMNI</span>
            <div class="hero-headline-text">${esc(a.catchcopy || '')}</div>
            <span class="hero-name-en-text">${esc(a.nameEn || '')}</span>
            <span class="hero-name-ja-text">${esc(a.nameJa || '')}</span>
            <span class="hero-meta-text">${esc(a.university || '')}</span>
            ${a.company ? `<div style="margin-top:20px;"><span class="hero-company-badge">${esc(a.company)}</span></div>` : ''}
          </div>
          <div class="scroll-line"><div class="scroll-line-fill"></div></div>
        </section>

        <div class="main-box">
          <div class="main-box-col">
            <span class="col-eyebrow">CURRENT CAREER</span>
            <div class="col-title-label">現在の仕事・キャリア</div>
            ${textToParas(a.career || '', 'dark-text')}
          </div>
          <div class="main-box-col">
            <span class="col-eyebrow">WISE EXPERIENCE</span>
            <div class="col-title-label">WISEでの経験</div>
            ${textToParas(a.wiseExp || '', 'dark-text')}
          </div>
        </div>

        <div class="banner">
          <div class="banner-line"></div>
          <span class="banner-label">${esc(a.bannerLabel || 'From WISE to the World')}</span>
          <div class="banner-line"></div>
        </div>

        <div class="qa-wrap">

          <!-- Q1: layout-single -->
          <div class="qa-block">
            <div class="qa-head">
              <span class="qa-num">Q — 01</span>
              <div class="qa-head-divider"></div>
              <span class="qa-question-text">${esc(q1.question || '')}</span>
            </div>
            <div class="layout-single">
              <div class="qa-text-col">${textToParas(q1.answer || '', 'qa-p')}</div>
            </div>
          </div>

          <!-- Q2: two-col + watermark -->
          <div class="qa-block watermark-wrap">
            <div class="watermark">WISE</div>
            <div class="qa-head">
              <span class="qa-num">Q — 02</span>
              <div class="qa-head-divider"></div>
              <span class="qa-question-text">${esc(q2.question || '')}</span>
            </div>
            <div class="layout-two-col">
              <div class="qa-text-col">${textToParas(q2a, 'qa-p')}</div>
              <div class="qa-text-col">${textToParas(q2b || q2.answer || '', 'qa-p')}</div>
            </div>
          </div>

          <!-- Q3: two-col -->
          <div class="qa-block">
            <div class="qa-head">
              <span class="qa-num">Q — 03</span>
              <div class="qa-head-divider"></div>
              <span class="qa-question-text">${esc(q3.question || '')}</span>
            </div>
            <div class="layout-two-col">
              <div class="qa-text-col">${textToParas(q3a, 'qa-p')}</div>
              <div class="qa-text-col">${textToParas(q3b || q3.answer || '', 'qa-p')}</div>
            </div>
          </div>

          <!-- Q4: asymmetric -->
          <div class="qa-block">
            <div class="qa-head">
              <span class="qa-num">Q — 04</span>
              <div class="qa-head-divider"></div>
              <span class="qa-question-text">${esc(q4.question || '')}</span>
            </div>
            <div class="layout-asymmetric">
              <div class="qa-text-col">${textToParas(q4a, 'qa-p')}</div>
              <div class="qa-text-col">${textToParas(q4b || q4.answer || '', 'qa-p')}</div>
            </div>
          </div>

          <!-- Q5: layout-single -->
          <div class="qa-block">
            <div class="qa-head">
              <span class="qa-num">Q — 05</span>
              <div class="qa-head-divider"></div>
              <span class="qa-question-text">${esc(q5.question || '')}</span>
            </div>
            <div class="layout-single">
              <div class="qa-text-col">${textToParas(q5.answer || '', 'qa-p')}</div>
            </div>
          </div>

        </div>

        ${renderRelated(a.id)}
      `;
    }

    // ══════════════════════════════════════════
    // Render: event
    // ══════════════════════════════════════════
    function renderEvent(a) {
      return `
        <section class="art-hero event-hero">
          <div class="h-bg"></div>
          <div class="h-body">
            <span class="hero-badge">COMPANY EVENT</span>
            <div class="hero-title-event">${esc(a.eventTitle || '')}</div>
            <div class="hero-meta-row">
              <span class="hero-date-text">${esc(a.date || '')}</span>
              <div class="hero-dot"></div>
              <span class="hero-location-text">${esc(a.location || 'WISE OFFICE')}</span>
            </div>
          </div>
          <div class="scroll-line"><div class="scroll-line-fill"></div></div>
        </section>

        <div class="intro-wrap-event">
          <span class="intro-eyebrow">OVERVIEW</span>
          <div class="intro-title">${esc(a.overviewTitle || '')}</div>
          <div class="intro-divider"></div>
          <div>${textToParas(a.overviewText || '', 'body-p')}</div>
        </div>

        <div class="photo-wrap">
          <div class="photo-grid">
            ${photoBox(a.photo1 || '', true)}
            ${photoBox(a.photo2 || '', false)}
            ${photoBox(a.photo3 || '', false)}
          </div>
          <div class="photo-count">
            <span class="photo-count-label">PHOTOS</span>
            <div class="photo-count-line"></div>
            <span class="photo-count-num">03</span>
          </div>
        </div>

        <div class="body-wrap-event">
          <div class="body-head">
            <span class="body-eyebrow">REPORT</span>
            <span class="body-title">イベントレポート</span>
            <div class="body-head-line"></div>
          </div>
          <div class="body-two-col">
            <div>${textToParas(a.reportLeft || '', 'body-p')}</div>
            <div>${textToParas(a.reportRight || '', 'body-p')}</div>
          </div>
        </div>

        <div class="quote-wrap">
          <div class="quote-inner">
            <span class="quote-mark">"</span>
            <div class="quote-text">${esc(a.pullQuote || '')}</div>
            <span class="quote-attr">— ${esc(a.pullQuoteAttr || '参加者コメント')}</span>
          </div>
        </div>

        <div class="closing-wrap">
          <div class="closing-head">
            <span class="closing-eyebrow">CLOSING</span>
            <div class="closing-head-line"></div>
          </div>
          <div>${textToParas(a.closingText || '', 'body-p')}</div>
        </div>

        ${renderRelated(a.id)}
      `;
    }

    // ══════════════════════════════════════════
    // Render: press
    // ══════════════════════════════════════════
    function renderPress(a) {
      const tags = (a.tags || '').split(',').map(t => t.trim()).filter(Boolean);
      const relLinks = a.relatedLinks || [];

      const tagHtml = tags.map(t =>
        `<span class="sidebar-tag">${esc(t)}</span>`
      ).join('');

      const linksHtml = relLinks.map(l =>
        `<a href="${esc(l.url || '#')}" class="sidebar-link-row" target="_blank" rel="noopener">
          <div class="sidebar-link-dot"></div>
          <span class="sidebar-link-text">${esc(l.text || l.url || '')}</span>
        </a>`
      ).join('');

      return `
        <section class="art-hero press-hero">
          <div class="h-bg"></div>
          <div class="h-body">
            <span class="hero-badge-press">PRESS / EXTERNAL EVENT</span>
            <div class="press-hero-title">${esc(a.pressTitle || '')}</div>
            <div class="hero-meta-row-press">
              ${(a.pressCategory || a.tags || '').split(',').slice(0,2).map(t =>
                `<span class="hero-tag">${esc(t.trim())}</span>`).join('')}
            </div>
            <span class="hero-date-press">${esc(a.date || '')}</span>
          </div>
          <div class="press-hero-right">
            <div class="hero-logo-box">
              <span class="hero-logo-label">${esc(a.mediaName || 'MEDIA / EVENT LOGO')}</span>
            </div>
          </div>
          <div class="scroll-line"><div class="scroll-line-fill"></div></div>
        </section>

        <div class="info-wrap">
          <div class="info-card">
            <div class="info-cell">
              <span class="info-label">MEDIA / EVENT</span>
              <span class="info-value">${esc(a.mediaName || '—')}</span>
            </div>
            <div class="info-cell">
              <span class="info-label">DATE</span>
              <span class="info-value">${esc(a.date || '—')}</span>
            </div>
            <div class="info-cell">
              <span class="info-label">CATEGORY</span>
              <span class="info-value">${esc(a.pressCategory || '—')}</span>
            </div>
            <div class="info-cell">
              <span class="info-label">URL / VENUE</span>
              <span class="info-value">${a.urlVenue
                ? `<a href="${esc(a.urlVenue)}" target="_blank" rel="noopener" style="color:var(--accent);text-decoration:none;">${esc(a.urlVenue)}</a>`
                : '—'
              }</span>
            </div>
          </div>
        </div>

        <div class="intro-wrap-press">
          <div class="intro-head">
            <span class="intro-eyebrow-press">OVERVIEW</span>
            <span class="intro-section-title">概要</span>
            <div class="intro-head-line"></div>
          </div>
          <div>${textToParas(a.overviewText || '', 'body-p')}</div>
        </div>

        <div class="photo-wrap">
          <div class="photo-grid-2">
            ${photoBox(a.photo1 || '', false)}
            ${photoBox(a.photo2 || '', false)}
          </div>
          <div class="photo-count">
            <span class="photo-count-label">PHOTOS</span>
            <div class="photo-count-line"></div>
            <span class="photo-count-num">02</span>
          </div>
        </div>

        <div class="body-wrap-press">
          <div class="body-main">
            <div class="body-main-head">
              <span class="body-eyebrow">DETAIL</span>
              <span class="body-section-title">詳細レポート</span>
              <div class="body-head-line"></div>
            </div>
            ${textToParas(a.detailText || '', 'body-p')}
          </div>
          <aside class="body-sidebar">
            ${tags.length > 0 ? `
            <div class="sidebar-card">
              <div class="sidebar-card-head">TAGS</div>
              <div class="sidebar-card-body">
                <div class="sidebar-tag-row">${tagHtml}</div>
              </div>
            </div>` : ''}
            ${relLinks.length > 0 ? `
            <div class="sidebar-card">
              <div class="sidebar-card-head">RELATED LINKS</div>
              <div class="sidebar-card-body" style="padding:0 20px;">${linksHtml}</div>
            </div>` : ''}
          </aside>
        </div>

        ${(a.sourceTitle || a.sourceUrl) ? `
        <div class="cta-wrap">
          <div class="cta-block">
            <div>
              <span class="cta-label">ORIGINAL SOURCE</span>
              <div class="cta-title">${esc(a.sourceTitle || a.sourceUrl || '')}</div>
              <span class="cta-meta">${esc(a.mediaName || '')}${a.date ? ' — ' + esc(a.date) : ''}</span>
            </div>
            <a href="${esc(a.sourceUrl || '#')}" class="cta-btn" target="_blank" rel="noopener">
              VIEW SOURCE <span>→</span>
            </a>
          </div>
        </div>` : ''}

        ${renderRelated(a.id)}
      `;
    }

    // ══════════════════════════════════════════
    // Main: load and dispatch
    // ══════════════════════════════════════════
    (async function init() {
      const params = new URLSearchParams(window.location.search);
      const id = params.get('id');
      const root = document.getElementById('root');

      if (!id) {
        root.innerHTML = `<div class="not-found"><h2>記事が見つかりません</h2><p>URLにIDが指定されていません。</p><a href="wise.html">ホームに戻る</a></div>`;
        return;
      }

      root.innerHTML = `<div style="text-align:center;padding:4rem;color:#888;">読み込み中…</div>`;

      const [{ data: row, error }, { data: allRows }] = await Promise.all([
        db.from('articles').select('id, data').eq('id', id).maybeSingle(),
        db.from('articles').select('id, data').order('id', { ascending: false }),
      ]);

      _allArticles = allRows ? allRows.map(r => ({ ...r.data, id: r.id })) : [];

      if (error || !row) {
        root.innerHTML = `<div class="not-found"><h2>記事が見つかりません</h2><p>この記事は存在しないか、削除されました。</p><a href="wise.html#journal">ジャーナルに戻る</a></div>`;
        return;
      }

      const article = { ...row.data, id: row.id };

      // Update breadcrumb title
      const titleStr = article.title || article.catchcopy || article.eventTitle || article.pressTitle || '記事';
      document.getElementById('bc-title').textContent = titleStr;
      document.title = `${titleStr} — WISE Journal`;

      let html = '';
      switch (article.template) {
        case 'intern':  html = renderIntern(article);  break;
        case 'alumni':  html = renderAlumni(article);  break;
        case 'event':   html = renderEvent(article);   break;
        case 'press':   html = renderPress(article);   break;
        default:
          root.innerHTML = `<div class="not-found"><h2>不明なテンプレート</h2><p>テンプレートタイプ「${esc(article.template)}」は対応していません。</p><a href="wise.html#journal">ジャーナルに戻る</a></div>`;
          return;
      }

      root.innerHTML = html;
    })();
  </script>

</body>
</html>
